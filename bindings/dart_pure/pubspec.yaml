name: glint_audio_pure
description: >-
  Pure-Dart MPEG-1 Layer III (MP3) encoder — no native code, no FFI, runs
  identically on every platform including the web. A pure-Dart sibling of the
  FFI-backed glint_audio, ported from the glint codec suite.
version: 0.5.0
repository: https://github.com/CrispStrobe/glint/tree/main/bindings/dart_pure
homepage: https://github.com/CrispStrobe/glint
issue_tracker: https://github.com/CrispStrobe/glint/issues

topics:
  - audio
  - codec
  - mp3
  - encoder

environment:
  sdk: ^3.0.0

# No runtime dependencies: dart:core, dart:math and dart:typed_data only.

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
