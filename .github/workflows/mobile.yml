name: Mobile

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLINT_MODE=fixed
          cmake --build build -j$(nproc)

      - name: Verify artifacts
        run: |
          ls -la build/libglint.a build/libglint.so
          file build/libglint.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: |
            build/libglint.a
            build/libglint.so

  ios:
    name: iOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            sdk: iphoneos
            platform: OS64
          - arch: arm64
            sdk: iphonesimulator
            platform: SIMULATORARM64
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_SYSROOT=$SDK_PATH \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLINT_MODE=fixed \
            -DCMAKE_C_FLAGS="-fembed-bitcode" \
            -DCMAKE_CXX_FLAGS="-fembed-bitcode" \
            -DCMAKE_XCODE_ATTRIBUTE_ONLY_ACTIVE_ARCH=NO
          cmake --build build --config Release -j

      - name: Verify artifacts
        run: |
          ls -la build/libglint.a
          file build/libglint.a
          lipo -info build/libglint.a

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ matrix.sdk }}-${{ matrix.arch }}
          path: build/libglint.a
