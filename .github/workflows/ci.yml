name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86-64
          - os: ubuntu-24.04-arm
            name: Linux aarch64
          - os: macos-latest
            name: macOS Apple Silicon
          - os: windows-latest
            name: Windows MSVC

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Smoke test (encode sine wave)
        shell: bash
        run: |
          # Generate a 1-second 1kHz sine wave as raw PCM, wrap in WAV
          python3 -c "
          import struct, math, sys
          sr = 44100; dur = 1; freq = 1000
          samples = [int(math.sin(2*math.pi*freq*i/sr)*30000) for i in range(sr*dur)]
          pcm = b''.join(struct.pack('<h', s) for s in samples)
          hdr  = b'RIFF' + struct.pack('<I', 36+len(pcm)) + b'WAVE'
          hdr += b'fmt ' + struct.pack('<IHHIIHH', 16, 1, 1, sr, sr*2, 2, 16)
          hdr += b'data' + struct.pack('<I', len(pcm))
          sys.stdout.buffer.write(hdr + pcm)
          " > /tmp/sine.wav

          # Encode
          if [ -f build/Release/glint_cli.exe ]; then
            ENC=build/Release/glint_cli.exe
          elif [ -f build/glint_cli ]; then
            ENC=build/glint_cli
          else
            echo "CLI binary not found" && ls -R build/ && exit 1
          fi

          $ENC /tmp/sine.wav /tmp/sine.mp3 -b 128
          echo "Encoded: $(wc -c < /tmp/sine.mp3) bytes"

          # Verify it's a valid MP3 (check sync word 0xFFxB)
          python3 -c "
          with open('/tmp/sine.mp3','rb') as f:
              h = f.read(2)
              assert h[0]==0xFF and (h[1]&0xE0)==0xE0, f'Bad sync: {h.hex()}'
              print('MP3 sync word OK')
              import os
              sz = os.path.getsize('/tmp/sine.mp3')
              assert sz > 1000, f'File too small: {sz}'
              print(f'File size: {sz} bytes')
          "

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glint-${{ matrix.os }}
          path: |
            build/glint_cli
            build/Release/glint_cli.exe
          if-no-files-found: warn
