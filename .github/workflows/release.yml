name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: glint_cli
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            artifact: glint_cli
          - os: macos-latest
            name: macos-arm64
            artifact: glint_cli
          - os: windows-latest
            name: windows-x86_64
            artifact: glint_cli.exe

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ -f build/Release/${{ matrix.artifact }} ]; then
            cp build/Release/${{ matrix.artifact }} dist/
          else
            cp build/${{ matrix.artifact }} dist/
          fi
          cd dist
          if [[ "${{ matrix.os }}" == windows* ]]; then
            7z a ../glint-${{ matrix.name }}.zip *
          else
            tar czf ../glint-${{ matrix.name }}.tar.gz *
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: glint-${{ matrix.name }}
          path: glint-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
